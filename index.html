<html lang="en">

<title>The 62 Decision</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#100f0c;--panel:#1a1815;--panel2:#221f1a;--line:#322e26;--lineGold:rgba(201,169,106,.22);
    --text:#ece6d8;--muted:#9b9384;--faint:#6f6757;--gold:#c9a96a;--goldB:#e3c389;
    --green:#8aa57f;--amber:#d7a35f;--red:#cf8568;
  }
  *{box-sizing:border-box}

  .tab{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:9px;border:1px solid transparent;
    background:transparent;color:var(--muted);font:600 13px 'Instrument Sans';cursor:pointer}
  .tab.active{background:var(--panel2);color:var(--goldB);border-color:var(--lineGold)}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border-radius:9px;border:1px solid var(--line);
    background:transparent;color:var(--muted);font:600 12px 'Instrument Sans';cursor:pointer}
  .btn.gold{border-color:var(--lineGold);color:var(--goldB)}
  .btn:hover{border-color:var(--lineGold)}
  .grid{display:grid;gap:12px}
  .g-cards{grid-template-columns:repeat(auto-fit,minmax(245px,1fr))}
  .g-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .g-opt{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}
  .g-w{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));column-gap:24px}

  textarea,input[type=text],input[type=password]{width:100%;background:var(--panel2);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:10px;font:13px/1.5 'Instrument Sans';resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--lineGold)}
  .badge{margin-top:8px;padding:8px 10px;border-radius:8px;font-size:12px}
  .badge.ok{background:rgba(138,165,127,.12);border:1px solid rgba(138,165,127,.3);color:var(--green)}

<body>
<div id="app"></div>
<div id="printArea"></div>

<script>
"use strict";
const clone=x=>JSON.parse(JSON.stringify(x));
/* ---------------- palette for JS-drawn bits ---------------- */
const C={gold:"#c9a96a",goldB:"#e3c389",muted:"#9b9384",faint:"#6f6757",line:"#322e26",
  text:"#ece6d8",green:"#8aa57f",amber:"#d7a35f",red:"#cf8568"};

/* ---------------- defaults ---------------- */
const DEFAULT_OPTIONS=[
 {id:"kpmg",name:"Stay at KPMG",tag:"The known path",
  notes:"Band 7 partner, 3 yrs in. Global account lead (BHP), ENR consulting lead. Strong trajectory. Risk: the whistleblower issue could hit the firm at PwC-scale or worse — reduced income, distraction, brand damage that makes selling harder.",
  s:{capability:9,brand:7,energy:6,reward:6,risk:7},ego:6,fear:4,lifecost:6,reverse:6,premortem:"",
  active:"mid",cases:{low:{label:"Income decreases",comp:550000},mid:{label:"Flat / modest uplift",comp:650000},high:{label:"Strong uplift (+$150k)",comp:800000}},
  timeline:[{label:"EOY outcome & bonus confirmed",date:""},{label:"Bonus payment date",date:""},{label:"Resignation date to meet new start",date:""},{label:"Notice period ends",date:""}]},
 {id:"fti",name:"FTI Consulting",tag:"The big swing",
  notes:"$1m/yr (last offer). New growth business, strong senior team. Tailwind: clients leaving the Big 4. Cost: rebuild a client base (3rd time in 8 yrs), hire a team, carry the pressure of that number.",
  s:{capability:7,brand:6,energy:6,reward:9,risk:7},ego:8,fear:7,lifecost:8,reverse:5,premortem:"",
  active:"high",cases:{low:{label:"Lowball offer",comp:700000},mid:{label:"Discounted offer",comp:850000},high:{label:"Full $1m (as before)",comp:1000000}},
  timeline:[{label:"Term sheet received",date:""},{label:"Final interview",date:""},{label:"Offer decision deadline",date:""},{label:"Start date",date:""}]},
 {id:"bhp",name:"Forge a role at BHP",tag:"The pivot to industry",
  notes:"No role yet, but well-connected to the C-suite — could forge one in ~6 months. Need min Band 16; aiming for 17–18. Bands map to General Manager (16–17) up to Asset President (18).",
  s:{capability:7,brand:8,energy:7,reward:6,risk:5},ego:5,fear:5,lifecost:5,reverse:5,premortem:"",
  active:"mid",cases:{low:{label:"Band 16 — General Manager",comp:650000},mid:{label:"Band 17 — Senior GM",comp:800000},high:{label:"Band 18 — Asset President",comp:950000}},
  timeline:[{label:"Confirm the role can exist",date:""},{label:"Meet C-level sponsor",date:""},{label:"Confirm band / level",date:""},{label:"Formal offer",date:""}]},
 {id:"alt",name:"The 4th option",tag:"The outlier",
  notes:"Your wildcard slot — a role outside your proven lane (an AI/tech enterprise sales lead, an advisory seat, or any other candidate). Use it as the outlier: set the cases and scores to whichever option you're testing.",
  s:{capability:6,brand:9,energy:9,reward:5,risk:8},ego:7,fear:6,lifecost:6,reverse:4,premortem:"",
  active:"mid",cases:{low:{label:"Conservative",comp:400000},mid:{label:"Expected",comp:500000},high:{label:"Strong",comp:650000}},
  timeline:[{label:"Initial conversation",date:""},{label:"Role & comp clarity",date:""},{label:"Decision point",date:""}]},
];
const CASE_KEYS=["low","mid","high"];
const OPT_COLOR={kpmg:"#c9a96a",fti:"#cf8568",bhp:"#8aa57f",alt:"#d7a35f"};
function effComp(o){return o.cases[o.active].comp;}
function activeLabel(o){return o.cases[o.active].label;}
const DEFAULT_A={currentAge:55,retireAge:62,returnRate:6,living:240000,retireTarget:240000,
  currentSuper:440000,currentInvest:0,superContrib:30000,withdrawal:4,mortgage:800000,
  clearMortgage:true,downsizeRelease:0,stress:false,stressComp:30};
const DEFAULT_W={financial:25,capability:15,brand:10,energy:15,safety:15,lifefit:20};
const DEFAULT_COUCH={
  northstar:"To reach the option to stop by 62 — through work that genuinely energises me — without trading away the health and family time that make that freedom worth having.",
  guardrails:[
    {text:"Financial floor: the path keeps me on track for optionality by 62 even in the stress case (3% returns), not only if everything goes right.",on:false},
    {text:"Energy: I can honestly rate the role 7+/10 on energy six months in, not just on day one. No role taken for money alone.",on:false},
    {text:"Life non-negotiables: daily training and protected time with my kids stay. Compressed is fine; abandoned is not. Any role that demands I drop them carries a hard end date.",on:false},
    {text:"Reversibility: I won't walk through a one-way door unless the upside is exceptional and survives the stress test.",on:false},
    {text:"Anti-distortion: before committing, the choice passes two tests — 'would I still choose it if I were already financially free?' and 'if no one knew the logo?'",on:false},
    {text:"A downside I can live with: I can name the pre-mortem for the chosen path and genuinely accept the worst case. If I can't stomach it, it's not my path.",on:false},
  ],answers:{}};
const REFLECTIONS=[
 "If no one ever knew which firm's name was on my card, would I still choose this?",
 "Am I drawn to the $1m mainly because it proves something to someone?",
 "Am I shrinking from rebuilding a client base because it's genuinely wrong — or because failing scares me?",
 "Which option would 62-year-old me, looking back, thank me for?",
 "If I were already financially free today, would this still be my choice?",
];
const DEEP_Q=[
 {id:"q1",q:"What's really stopping me leaving KPMG — the opportunity ahead, or the fear of change and having to prove myself somewhere new?"},
 {id:"q2",q:"What exactly am I afraid of about FTI? Name it precisely. What's the worst case — and what would I actually do if it happened?"},
 {id:"q3",q:"Which of my emotions here are data (energy, values, fit) and which are distortion (ego, fear of being found out, loss aversion)? Which am I letting drive?"},
 {id:"q4",q:"If I were already financially free today, which path would I choose — and what does that tell me?"},
 {id:"q5",q:"What would I regret more at 70: the risk I took, or the one I didn't?"},
];

/* ---------------- state ---------------- */
const LS_KEY="the62_state", LS_API="the62_apikey", LS_MODEL="the62_model";
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function freshState(){return {options:clone(DEFAULT_OPTIONS),a:{...DEFAULT_A},
  w:{...DEFAULT_W},couch:clone(DEFAULT_COUCH),checks:{},ai:null};}
function load(){
  try{const raw=lsGet(LS_KEY);
    if(raw){const s=JSON.parse(raw);
      // merge option labels from defaults, keep user inputs
      const opts=DEFAULT_OPTIONS.map(def=>{
        const st=(s.options||[]).find(o=>o.id===def.id);
        if(!st) return clone(def);
        const cases=clone(def.cases);
        if(st.cases){CASE_KEYS.forEach(k=>{ if(st.cases[k]&&typeof st.cases[k].comp==="number") cases[k].comp=st.cases[k].comp; });}
        else if(typeof st.comp==="number"){ cases.mid.comp=st.comp; } // migrate old single comp
        return {...clone(def),s:st.s??def.s,ego:st.ego??def.ego,fear:st.fear??def.fear,
          lifecost:st.lifecost??def.lifecost,reverse:st.reverse??def.reverse,premortem:st.premortem??"",
          cases,active:st.active||def.active,
          timeline:Array.isArray(st.timeline)&&st.timeline.length?st.timeline:def.timeline};});
      return {options:opts,a:{...DEFAULT_A,...(s.a||{})},w:{...DEFAULT_W,...(s.w||{})},
        couch:{...clone(DEFAULT_COUCH),...(s.couch||{})},checks:s.checks||{},ai:s.ai||null};
    }}catch(e){}
  return freshState();
}
let S=load();
let apiKey=lsGet(LS_API)||"";
let model=lsGet(LS_MODEL)||"claude-sonnet-4-6";
let activeTab="dashboard";
let lastErr="";
let aiBusy=false;

function save(){lsSet(LS_KEY,JSON.stringify(S));}

/* ---------------- markdown -> clean html ---------------- */
function mdToHtml(md){
  if(!md) return "";
  const ic=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+?)`/g,"<code>$1</code>");
  const lines=md.replace(/\r/g,"").split("\n"); let html="",i=0;
  while(i<lines.length){
    const l=lines[i];
    let m=l.match(/^\s*(#{1,6})\s+(.*)$/);
    if(m){const lvl=Math.min(m[1].length,4),sz=lvl<=1?16:lvl===2?14.5:13;
      html+=`<div style="font-weight:700;font-size:${sz}px;margin:12px 0 4px;font-family:'Fraunces',serif">${ic(m[2])}</div>`;i++;continue;}
    if(/^\s*[-*]\s+/.test(l)){html+='<ul style="margin:4px 0 8px 18px;padding:0">';
      while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){html+=`<li style="margin-bottom:3px">${ic(lines[i].replace(/^\s*[-*]\s+/,""))}</li>`;i++;}
      html+="</ul>";continue;}
    if(/^\s*\d+\.\s+/.test(l)){html+='<ol style="margin:4px 0 8px 20px;padding:0">';
      while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){html+=`<li style="margin-bottom:3px">${ic(lines[i].replace(/^\s*\d+\.\s+/,""))}</li>`;i++;}
      html+="</ol>";continue;}
    if(/^\s*$/.test(l)){i++;continue;}
    const para=[l];i++;
    while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^\s*#{1,6}\s+/.test(lines[i])&&!/^\s*[-*]\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])){para.push(lines[i]);i++;}
    html+=`<p style="margin:0 0 8px;line-height:1.55">${ic(para.join(" "))}</p>`;
  }
  return html;
}

/* ---------------- finance ---------------- */
function afterTax(g){
  const b=[[18200,0],[45000,.16],[135000,.30],[190000,.37],[Infinity,.45]];
  let t=0,p=0;for(const[c,r]of b){if(g>p){t+=(Math.min(g,c)-p)*r;p=c;}else break;}
  return Math.max(0,g-t-g*0.02);
}
function project(opt){
  const a=S.a, years=Math.max(0,a.retireAge-a.currentAge);
  const r=Math.max(0,(a.returnRate-(a.stress?3:0)))/100;
  const comp=effComp(opt)*(a.stress?(1-a.stressComp/100):1);
  const gf=Math.pow(1+r,years), af=r===0?years:(Math.pow(1+r,years)-1)/r;
  const net=afterTax(comp), save=Math.max(0,net-a.living);
  const personal=a.currentInvest*gf+save*af, sup=a.currentSuper*gf+a.superContrib*af;
  let liq=personal+sup; if(a.clearMortgage) liq-=a.mortgage; liq=Math.max(0,liq);
  const liqP=liq+a.downsizeRelease;
  return {years,net,save,liq,liqP,sust:liqP*(a.withdrawal/100)};
}
function rows(){
  const proj=S.options.map(o=>({o,p:project(o)}));
  const maxS=Math.max(...proj.map(x=>x.p.sust),1);
  const wSum=S.w.financial+S.w.capability+S.w.brand+S.w.energy+S.w.safety+S.w.lifefit||1;
  const out=proj.map(({o,p})=>{
    const sc={financial:(p.sust/maxS)*100,capability:o.s.capability*10,brand:o.s.brand*10,
      energy:o.s.energy*10,safety:(10-o.s.risk)*10,lifefit:(10-o.lifecost)*10};
    const total=(S.w.financial*sc.financial+S.w.capability*sc.capability+S.w.brand*sc.brand+
      S.w.energy*sc.energy+S.w.safety*sc.safety+S.w.lifefit*sc.lifefit)/wSum;
    return {o,p,sc,total,bias:o.ego+o.fear};
  });
  out.sort((x,y)=>y.total-x.total);
  return out;
}
const fmt=n=>"$"+Math.round(n).toLocaleString("en-AU");
const fmtK=n=>n>=1e6?"$"+(n/1e6).toFixed(2)+"m":"$"+Math.round(n/1000)+"k";
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ---------------- insights & mirror ---------------- */
function insights(R){
  const out=[],top=R[0],a=S.a;
  const byRew=[...R].sort((x,y)=>y.p.sust-x.p.sust)[0];
  const byEn=[...R].sort((x,y)=>y.o.s.energy-x.o.s.energy)[0];
  const byLife=[...R].sort((x,y)=>y.o.lifecost-x.o.lifecost)[0];
  const byRev=[...R].sort((x,y)=>x.o.reverse-y.o.reverse)[0];
  out.push([C.gold,"Your highest-weighted path is "+top.o.name+".","It leads on your current weights — but the ranking is only as honest as the scores you set. Adjust them and watch it move."]);
  if(a.stress)out.push([C.red,"Stress test is ON.","These rankings assume "+(a.returnRate-3)+"% returns and a "+a.stressComp+"% comp haircut. The path on top now is the one that survives the bad case — arguably the more important test."]);
  if(top.o.ego>=7)out.push([C.amber,"Your leading choice carries a strong ego charge.","You marked "+top.o.name+" high on ego ("+top.o.ego+"/10). Is the strategy choosing it — or the part of you that needs to prove worth?"]);
  if(byRew.o.fear>=7&&byRew.o.id!==top.o.id)out.push([C.red,byRew.o.name+" is financially strongest, but you're afraid of it.","Highest income ("+fmtK(byRew.p.sust)+"/yr) yet fear "+byRew.o.fear+"/10. Is the fear about genuine fit, or about being seen to fail at a rebuild?"]);
  if(byLife.o.lifecost>=7)out.push([C.amber,byLife.o.name+" has the highest life cost.","You marked it "+byLife.o.lifecost+"/10 on the toll to gym, kids and health — the very things you can't trade away. If it ranks high, demand a hard end date."]);
  if(byRev.o.reverse<=4)out.push([C.muted,byRev.o.name+" is the hardest to undo.","Reversibility "+byRev.o.reverse+"/10 — close to a one-way door. Since optionality is your whole goal, a low-reversibility bet needs a much higher payoff."]);
  const best=Math.max(...R.map(r=>r.p.sust));
  if(best<a.retireTarget)out.push([C.gold,"No single role reaches "+fmtK(a.retireTarget)+"/yr from investments alone by "+a.retireAge+".","Even the strongest lands at ~"+fmtK(best)+"/yr. The house downsizing lever and a realistic spend do the real work — set those and the job choice gets lighter."]);
  return out;
}
function mirror(R){
  if(!R.length)return[];const out=[],top=R[0];
  const kpmg=R.find(r=>r.o.id==="kpmg"),fti=R.find(r=>r.o.id==="fti");
  const byEn=[...R].sort((x,y)=>y.o.s.energy-x.o.s.energy)[0];
  if(kpmg)out.push(["On staying at KPMG","It's where your competence is already proven and witnessed. Be honest: is the pull to stay about the opportunity ahead — or the comfort of not having to re-earn recognition somewhere new? You tend to frame it as 'leaving KPMG,' not 'going toward' something. Loss-framing is usually fear talking."]);
  if(fti&&fti.o.ego>=6&&fti.o.fear>=6)out.push(["On the $1m at FTI","You've loaded it with both your strongest pull and a strong fear — that combination means it's touching something deeper than money. Separate the operational problem (rebuilding a book — solvable with the right deal terms) from the identity threat (being seen to fail — the old wound). Only the first is a real reason to say no."]);
  if(byEn.o.id!==top.o.id)out.push(["Your head and your energy disagree","Your top-ranked path is "+top.o.name+", but the one that lights you up most is "+byEn.o.name+". For the final act of a career, how much excitement are you willing to trade for whatever is driving that ranking?"]);
  if(top.o.lifecost>=7)out.push(["The cost you said you can't pay","Your leading path also carries the highest toll on training and family. If it stays on top, that toll has to become a guardrail with a hard end date, not an afterthought."]);
  out.push(["The honest question","If you were already financially free today, which of these four would you still choose? Whatever you just answered is worth more than any number on this screen."]);
  return out;
}

/* ---------------- charts (hand-drawn SVG) ---------------- */
function barChart(R){
  const W=400,H=210,pad=34,bw=(W-pad-10)/R.length*0.6,gap=(W-pad-10)/R.length;
  const target=S.a.retireTarget;
  const max=Math.max(target,...R.map(r=>r.p.sust))*1.12||1;
  const y=v=>H-26-(v/max)*(H-50);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="210" preserveAspectRatio="xMidYMid meet">`;
  for(let i=0;i<=3;i++){const v=max*i/3,yy=y(v);
    s+=`<line x1="${pad}" y1="${yy}" x2="${W-6}" y2="${yy}" stroke="${C.line}" stroke-dasharray="2 4"/>`;
    s+=`<text x="${pad-4}" y="${yy+3}" fill="${C.muted}" font-size="8" text-anchor="end">$${Math.round(v/1000)}k</text>`;}
  s+=`<line x1="${pad}" y1="${y(target)}" x2="${W-6}" y2="${y(target)}" stroke="${C.gold}" stroke-dasharray="5 4"/>`;
  s+=`<text x="${W-8}" y="${y(target)-4}" fill="${C.gold}" font-size="8" text-anchor="end">target ${fmtK(target)}</text>`;
  R.forEach((r,i)=>{const x=pad+gap*i+(gap-bw)/2, yy=y(r.p.sust);
    s+=`<rect x="${x}" y="${yy}" width="${bw}" height="${H-26-yy}" rx="4" fill="${i===0?C.goldB:C.faint}"/>`;
    s+=`<text x="${x+bw/2}" y="${yy-4}" fill="${C.text}" font-size="8" text-anchor="middle">${fmtK(r.p.sust)}</text>`;
    const nm=r.o.name.replace(/^(Stay at |Forge a role at )/,"");
    s+=`<text x="${x+bw/2}" y="${H-12}" fill="${C.muted}" font-size="8" text-anchor="middle">${esc(nm.length>14?nm.slice(0,13)+"…":nm)}</text>`;});
  return s+`</svg>`;
}
function scatterChart(R){
  const W=400,H=210,px=34,py=24;
  const X=v=>px+(v/100)*(W-px-12), Y=v=>H-py-(v/20)*(H-py-14);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="210" preserveAspectRatio="xMidYMid meet">`;
  s+=`<line x1="${px}" y1="${Y(0)}" x2="${W-6}" y2="${Y(0)}" stroke="${C.line}"/>`;
  s+=`<line x1="${px}" y1="${Y(0)}" x2="${px}" y2="12" stroke="${C.line}"/>`;
  s+=`<text x="${W-6}" y="${H-6}" fill="${C.faint}" font-size="8" text-anchor="end">weighted strength →</text>`;
  s+=`<text x="6" y="14" fill="${C.faint}" font-size="8">↑ ego + fear</text>`;
  R.forEach((r,i)=>{const x=X(r.total),yy=Y(r.bias);
    s+=`<circle cx="${x}" cy="${yy}" r="6" fill="${i===0?C.goldB:C.gold}"/>`;
    const nm=r.o.name.replace(/^(Stay at |Forge a role at )/,"");
    s+=`<text x="${x}" y="${yy-9}" fill="${C.muted}" font-size="8" text-anchor="middle">${esc(nm.length>13?nm.slice(0,12)+"…":nm)}</text>`;});
  return s+`</svg>`;
}

/* ---------------- state setter by path ---------------- */
function applyPath(path,val){
  if(!path||path.indexOf("_DUMMY")>=0)return;
  const p=path.split(".");
  if(p[0]==="a"){S.a[p[1]]=val;}
  else if(p[0]==="w"){S.w[p[1]]=val;}
  else if(p[0]==="optS"){const o=S.options.find(x=>x.id===p[1]);if(o)o.s[p[2]]=val;}
  else if(p[0]==="opt"){const o=S.options.find(x=>x.id===p[1]);if(o)o[p[2]]=val;}
  else if(p[0]==="couch"){
    if(p[1]==="northstar")S.couch.northstar=val;
    else if(p[1]==="guard")S.couch.guardrails[+p[2]].text=val;
    else if(p[1]==="ans")S.couch.answers[p[2]]=val;
  }
  else if(p[0]==="case"){const o=S.options.find(x=>x.id===p[1]);if(o)o.cases[p[2]].comp=val;}
  else if(p[0]==="caselabel"){const o=S.options.find(x=>x.id===p[1]);if(o)o.cases[p[2]].label=val;}
  else if(p[0]==="tl"){const o=S.options.find(x=>x.id===p[1]);if(o&&o.timeline[+p[2]])o.timeline[+p[2]][p[3]]=val;}
  save();
}

/* ---------------- AI deep-dive ---------------- */
async function runAI(){
  apiKey=(document.getElementById("apiKey")||{}).value||apiKey;
  model=(document.getElementById("model")||{}).value||model;
  lsSet(LS_API,apiKey);lsSet(LS_MODEL,model);
  lastErr="";
  if(!apiKey){lastErr="Please paste your Anthropic API key first.";render();return;}
  const embedded=(window.self!==window.top), isFile=location.protocol==="file:";
  if(embedded){lastErr="This looks like an embedded preview (e.g. inside the Claude chat), which blocks calls to outside services — so the API request can't go through here.\n\nFix: open your hosted page (your GitHub Pages URL, https://<you>.github.io/<repo>/) in a normal browser tab and run the deep-dive there. Your typed answers are saved, so they'll be waiting.";render();return;}
  aiBusy=true;render();
  const R=rows();
  const summary=R.map((r,i)=>`#${i+1} ${r.o.name} (${r.o.tag}) — weighted ${Math.round(r.total)}/100; active scenario "${activeLabel(r.o)}" at ${fmt(effComp(r.o))} gross; sustainable income ${fmtK(r.p.sust)}/yr; capability ${r.o.s.capability}/10, brand ${r.o.s.brand}/10, energy ${r.o.s.energy}/10, reward ${r.o.s.reward}/10, risk ${r.o.s.risk}/10, life-cost ${r.o.lifecost}/10, reversibility ${r.o.reverse}/10, ego ${r.o.ego}/10, fear ${r.o.fear}/10.${r.o.premortem?" Pre-mortem: "+r.o.premortem:""}`).join("\n");
  const dated=[];S.options.forEach(o=>(o.timeline||[]).forEach(m=>{if(m.date)dated.push(m.date+" — "+o.name+": "+m.label);}));
  dated.sort();
  const answers=DEEP_Q.map(q=>`Q: ${q.q}\nA: ${S.couch.answers[q.id]||"(blank)"}`).join("\n\n");
  const guards=S.couch.guardrails.map(g=>(g.on?"[met] ":"[ ] ")+g.text).join("\n");
  const sys="You are a sharp, warm executive life-strategist and decision coach for a 55-year-old consulting partner deciding the final act of his career, aiming to reach financial optionality by 62 without sacrificing health and family. Be honest and challenging but kind. Ground every observation in the data and answers provided. Separate strategy from ego and imposter fear. Do NOT give clinical or psychiatric diagnoses; speak as a coach, in hypotheses, not verdicts. Be concise and specific. Use short headed sections.";
  const user=`Here is my decision data.\n\nNORTHSTAR: ${S.couch.northstar}\n\nGUARDRAILS:\n${guards}\n\nOPTIONS (with the scenario case I'm currently modelling):\n${summary}\n\nKEY DATES NEXT 30 DAYS:\n${dated.length?dated.join("\n"):"(none set)"}\n\nMY WRITTEN ANSWERS:\n${answers}\n\nPlease give me a deep-dive: (1) the pattern across my scores and answers, (2) where ego or imposter fear seem to be distorting my thinking, (3) the one question I appear to be avoiding, (4) given the dates, what I should pin down first, and (5) a recommendation framed as a test I can run, not an order. Challenge me.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"content-type":"application/json","x-api-key":apiKey,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:model,max_tokens:1800,system:sys,messages:[{role:"user",content:user}]})});
    const data=await res.json();
    if(data.error){lastErr="API error: "+(data.error.message||JSON.stringify(data.error))+"\n\nIf it mentions the model, type a current model name in the Model field (e.g. claude-sonnet-4-6). If it mentions credit/billing, add a payment method at console.anthropic.com.";}
    else{const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      if(txt){S.ai={text:txt,when:new Date().toISOString(),model:model};save();}
      else lastErr="(empty response)";}
  }catch(e){
    let hint;
    if(isFile) hint="Likely cause: the page was opened straight from a file (file://), which browsers block from calling APIs. Either host it on GitHub Pages, or serve it locally — in the file's folder run:  python3 -m http.server  then open  http://localhost:8000";
    else hint="Checklist: (1) you're running this from the hosted https page in a normal browser tab (not a preview); (2) the key is correct and active at console.anthropic.com; (3) billing/credit is set up; (4) you're online; (5) no ad-blocker, VPN or privacy extension is blocking api.anthropic.com.";
    lastErr="Request failed: "+e.message+"\n\n"+hint;
  }
  aiBusy=false;render();
}

/* ---------------- JSON backup ---------------- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="the-62-decision-backup.json";a.click();URL.revokeObjectURL(url);
}
function importJSON(file){
  const r=new FileReader();
  r.onload=()=>{try{const s=JSON.parse(r.result);
    if(s.options){S.options=DEFAULT_OPTIONS.map(def=>{const st=s.options.find(o=>o.id===def.id);
      if(!st) return clone(def);
      const cases=clone(def.cases);
      if(st.cases){CASE_KEYS.forEach(k=>{if(st.cases[k]&&typeof st.cases[k].comp==="number")cases[k].comp=st.cases[k].comp;});}
      else if(typeof st.comp==="number"){cases.mid.comp=st.comp;}
      return {...clone(def),s:st.s??def.s,ego:st.ego??def.ego,fear:st.fear??def.fear,
        lifecost:st.lifecost??def.lifecost,reverse:st.reverse??def.reverse,premortem:st.premortem??"",
        cases,active:st.active||def.active,
        timeline:Array.isArray(st.timeline)&&st.timeline.length?st.timeline:def.timeline};});}
    if(s.a)S.a={...DEFAULT_A,...s.a}; if(s.w)S.w={...DEFAULT_W,...s.w};
    if(s.couch)S.couch={...clone(DEFAULT_COUCH),...s.couch}; if(s.checks)S.checks=s.checks;
    if(s.ai)S.ai=s.ai;
    save();render();
  }catch(e){alert("Could not read that file: "+e.message);}};
  r.readAsText(file);
}

    if(activeTab==="money")updateMoneyReadouts();
  } else if(t.matches('textarea[data-path]')){ applyPath(t.dataset.path,t.value); }
  else if(t.matches('input[type=text][data-path]')){ applyPath(t.dataset.path,t.value); }
  else if(t.matches('input[type=date][data-path]')){ applyPath(t.dataset.path,t.value); }
  else if(t.id==="apiKey"){ apiKey=t.value; lsSet(LS_API,apiKey); }
  else if(t.id==="model"){ model=t.value; lsSet(LS_MODEL,model); }
});
app.addEventListener("change",e=>{
  const t=e.target;
  if(t.matches('input[type=checkbox][data-path]')){ applyPath(t.dataset.path,t.checked);
    if(activeTab==="money")updateMoneyReadouts(); }
  else if(t.matches('input[type=date][data-path]')){ if(activeTab==="next")render(); }
  else if(t.dataset.guardon!==undefined){ S.couch.guardrails[+t.dataset.guardon].on=t.checked;
    save(); t.closest('.guard').classList.toggle('on',t.checked); }
  else if(t.dataset.check!==undefined){ S.checks[t.dataset.check]=t.checked; save();
    t.parentElement.querySelector('span').style.color=t.checked?'var(--text)':'var(--muted)'; }
  else if(t.id==="importFile" && t.files[0]){ importJSON(t.files[0]); }
});
app.addEventListener("click",e=>{
  const tab=e.target.closest('[data-tab]'); if(tab){activeTab=tab.dataset.tab;render();return;}
  const act=e.target.closest('[data-action]'); if(!act)return;
  const a=act.dataset.action;
  if(a==="toggleStress"){S.a.stress=!S.a.stress;save();render();}
  else if(a==="setCase"){const o=S.options.find(x=>x.id===act.dataset.id);if(o){o.active=act.dataset.key;save();render();}}
  else if(a==="addTL"){const o=S.options.find(x=>x.id===act.dataset.id);if(o){o.timeline.push({label:"New milestone",date:""});save();render();}}
  else if(a==="delTL"){const o=S.options.find(x=>x.id===act.dataset.id);if(o){o.timeline.splice(+act.dataset.i,1);save();render();}}
  else if(a==="export"){exportJSON();}
  else if(a==="importTrigger"){document.getElementById("importFile").click();}
  else if(a==="reset"){if(confirm("Reset everything to defaults? This clears your saved inputs in this browser.")){S=freshState();save();render();}}
  else if(a==="print"){buildPrint();window.print();}
  else if(a==="runAI"){runAI();}
});

render();
</script>
</body>
</html>
